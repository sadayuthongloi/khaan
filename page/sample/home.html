<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoDB Connection Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 flex h-screen">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
        <div class="p-6">
            <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <i class="fas fa-database text-green-600"></i> MongoDB
            </h1>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="#" class="flex items-center gap-3 p-3 bg-blue-50 text-blue-600 rounded-lg font-medium">
                <i class="fas fa-plug w-5"></i> Connections
            </a>
            <a href="#" class="flex items-center gap-3 p-3 text-gray-500 hover:bg-gray-100 rounded-lg transition">
                <i class="fas fa-cog w-5"></i> Settings
            </a>
            <a href="#" class="flex items-center gap-3 p-3 text-gray-500 hover:bg-gray-100 rounded-lg transition">
                <i class="fas fa-history w-5"></i> History
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white border-b border-gray-200 p-4 flex justify-between items-center shadow-sm">
            <div class="relative w-96">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                <input type="text" placeholder="Search connections..."
                    class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button
                class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full text-sm font-medium transition flex items-center gap-2">
                <i class="fas fa-plus"></i> New connection
            </button>
        </header>

        <div class="p-8 overflow-y-auto">
            <div class="mb-6">
                <h2 class="text-2xl font-semibold text-gray-800">Existing connections</h2>
                <p class="text-gray-500 text-sm">Manage and test your database connections</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition group">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-green-50 rounded-xl group-hover:bg-green-100 transition">
                            <i class="fas fa-server text-green-600"></i>
                        </div>
                        <span
                            class="bg-green-100 text-green-600 text-[10px] px-2 py-1 rounded-full uppercase font-bold tracking-wider">Connected</span>
                    </div>
                    <h3 class="text-lg font-bold text-gray-800 mb-1">endoindex</h3>
                    <div class="text-sm text-gray-500 space-y-1 mb-6">
                        <p><i class="fas fa-link mr-2"></i> localhost:27017</p>
                        <p><i class="fas fa-user mr-2"></i> User: medica</p>
                    </div>
                    <div class="flex gap-2">
                        <button
                            class="flex-1 py-2 text-xs border border-gray-200 rounded-lg hover:bg-gray-50 font-medium">Test</button>
                        <button
                            class="flex-1 py-2 text-xs bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">Use</button>
                        <button
                            class="px-3 py-2 text-xs text-red-500 border border-red-50 text-red-100 rounded-lg hover:bg-red-50 transition"><i
                                class="fas fa-trash"></i></button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition group">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-3 bg-blue-50 rounded-xl group-hover:bg-blue-100 transition">
                            <i class="fas fa-server text-blue-600"></i>
                        </div>
                        <span
                            class="bg-gray-100 text-gray-400 text-[10px] px-2 py-1 rounded-full uppercase font-bold tracking-wider">Idle</span>
                    </div>
                    <h3 class="text-lg font-bold text-gray-800 mb-1">moss_local</h3>
                    <div class="text-sm text-gray-500 space-y-1 mb-6">
                        <p><i class="fas fa-link mr-2"></i> localhost:27017</p>
                        <p><i class="fas fa-user mr-2"></i> User: admin</p>
                    </div>
                    <div class="flex gap-2">
                        <button
                            class="flex-1 py-2 text-xs border border-gray-200 rounded-lg hover:bg-gray-50 font-medium">Test</button>
                        <button
                            class="flex-1 py-2 text-xs bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium">Use</button>
                        <button
                            class="px-3 py-2 text-xs text-red-500 border border-red-50 rounded-lg hover:bg-red-50 transition"><i
                                class="fas fa-trash"></i></button>
                    </div>
                </div>

            </div>

        </div>
    </main>
</body>

</html>
