<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoDB Manager - Collections</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] flex h-screen overflow-hidden text-slate-700">

    <aside class="w-72 bg-white border-r border-gray-200 flex flex-col shadow-sm">
        <div class="p-6">
            <div class="flex items-center justify-between mb-2">
                <h1 class="text-xl font-bold text-blue-600">MongoDB Manager</h1>
                <button class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <p class="text-[11px] text-gray-400 font-mono">HOST: localhost:27017</p>
        </div>
        
        <div class="px-6 py-2">
            <span class="text-[11px] font-bold text-gray-400 uppercase tracking-widest">ฐานข้อมูล</span>
        </div>

        <nav class="flex-1 overflow-y-auto custom-scrollbar px-3 space-y-1">
            <button class="w-full flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-50 rounded-xl transition group">
                <i class="fas fa-database text-xs text-gray-300 group-hover:text-blue-400"></i>
                <span class="text-sm">admin</span>
            </button>
            <button class="w-full flex items-center gap-3 px-4 py-3 bg-blue-600 text-white rounded-xl shadow-lg shadow-blue-100 transition">
                <i class="fas fa-database text-xs opacity-70"></i>
                <span class="text-sm font-semibold">endoindex</span>
            </button>
            <button class="w-full flex items-center gap-3 px-4 py-3 text-gray-500 hover:bg-gray-50 rounded-xl transition group">
                <i class="fas fa-database text-xs text-gray-300 group-hover:text-blue-400"></i>
                <span class="text-sm">orthanc_db</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="bg-white border-b border-gray-200 px-8 py-6">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-3">
                        <i class="fas fa-folder-open text-blue-500"></i>
                        ฐานข้อมูล: endoindex
                    </h2>
                    <p class="text-gray-400 text-sm mt-1">ทั้งหมด <span class="text-blue-600 font-semibold">76</span> คอลเลกชัน</p>
                </div>
                <div class="flex items-center gap-3">
                    <button class="flex items-center gap-2 px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-sm font-medium transition shadow-sm shadow-emerald-100">
                        <i class="fas fa-file-import"></i> Import
                    </button>
                    <button class="flex items-center gap-2 px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg text-sm font-medium transition shadow-sm shadow-blue-100">
                        <i class="fas fa-file-export"></i> Export
                    </button>
                </div>
            </div>
        </header>

        <div class="flex-1 p-8 overflow-hidden flex flex-col">
            <div class="bg-white rounded-2xl border border-gray-200 shadow-sm flex-1 flex flex-col overflow-hidden">
                <div class="p-4 border-b border-gray-100 bg-gray-50/30 flex items-center gap-4">
                    <div class="relative flex-1">
                        <i class="fas fa-search absolute left-3 top-2.5 text-gray-400 text-sm"></i>
                        <input type="text" placeholder="ค้นหารายชื่อคอลเลกชัน..." class="w-full pl-10 pr-4 py-2 bg-white border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition">
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto custom-scrollbar">
                    <table class="w-full text-left border-collapse">
                        <thead class="sticky top-0 bg-white shadow-[0_1px_0_0_rgba(0,0,0,0.05)] z-10">
                            <tr class="text-gray-400 text-[11px] uppercase tracking-wider">
                                <th class="px-6 py-4 font-bold w-12 text-center">
                                    <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                                </th>
                                <th class="px-6 py-4 font-bold">ชื่อ Collection</th>
                                <th class="px-6 py-4 font-bold text-right">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-50">
                            <tr class="hover:bg-blue-50/30 transition group">
                                <td class="px-6 py-4 text-center">
                                    <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                                </td>
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-8 h-8 rounded-lg bg-gray-100 flex items-center justify-center text-gray-400 group-hover:bg-blue-100 group-hover:text-blue-500 transition">
                                            <i class="fas fa-table text-xs"></i>
                                        </div>
                                        <span class="text-sm font-medium text-slate-700">products</span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-right">
                                    <button class="text-xs font-semibold text-blue-600 hover:underline">เปิดดูข้อมูล</button>
                                </td>
                            </tr>
                            <tr class="hover:bg-blue-50/30 transition group">
                                <td class="px-6 py-4 text-center">
                                    <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                                </td>
                                <td class="px-6 py-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-8 h-8 rounded-lg bg-gray-100 flex items-center justify-center text-gray-400 group-hover:bg-blue-100 group-hover:text-blue-500 transition">
                                            <i class="fas fa-table text-xs"></i>
                                        </div>
                                        <span class="text-sm font-medium text-slate-700">record_pdf</span>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-right">
                                    <button class="text-xs font-semibold text-blue-600 hover:underline">เปิดดูข้อมูล</button>
                                </td>
                            </tr>
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
