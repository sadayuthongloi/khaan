<!-- P2-C · Document Editor View -->
<!-- State read from window: currentConnection, currentDatabase, currentCollection, currentEditingDocumentId -->

<style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
    .mono { font-family: 'JetBrains Mono', monospace; }
    .editor-scrollbar::-webkit-scrollbar { width: 6px; }
    .editor-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    html.dark .editor-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; }
</style>

<div class="flex flex-col flex-1 min-h-0 overflow-hidden">
    <header class="bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 px-8 py-4 flex items-center justify-between flex-shrink-0" id="editor-header">
        <div class="flex flex-col">
            <div class="flex items-center gap-2 text-xs text-gray-400 dark:text-gray-500 mb-1" id="editor-breadcrumb"></div>
            <h2 class="text-xl font-bold text-slate-800 dark:text-gray-100">Edit document</h2>
        </div>
        <div class="flex items-center gap-2">
            <button type="button" class="px-4 py-2 text-sm font-bold text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition" onclick="sortEditorFields()">
                <i class="fas fa-sort-alpha-down mr-2"></i>A-Z
            </button>
            <button type="button" class="px-4 py-2 text-sm font-bold bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 text-slate-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-600 rounded-lg transition shadow-sm" id="editor-save-all-btn" onclick="window.saveAllFields && window.saveAllFields()">
                <i class="fas fa-save mr-2 text-blue-500 dark:text-blue-400"></i>Save all
            </button>
            <button type="button" class="px-4 py-2 text-sm font-bold bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/50 rounded-lg transition" onclick="closeEditor()">
                <i class="fas fa-times mr-2"></i>Close
            </button>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto editor-scrollbar p-8 min-h-0" id="editor-fields-container">
        <div class="loading flex items-center justify-center py-12">
            <div class="text-center text-gray-500 dark:text-gray-400">
                <div class="spinner"></div>
                <p class="mt-2">Loading document...</p>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    let currentDocumentData = null;
    const fieldTypes = {}; // key -> 'string'|'number'|'boolean'|'array'|'object'

    function escapeHtml(s) {
        if (s === null || s === undefined) return '';
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function escapeAttr(s) {
        if (s === null || s === undefined) return '';
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function safeIdKey(key) {
        return String(key).replace(/[^a-zA-Z0-9_-]/g, '_');
    }

    function inferType(value) {
        if (value === null || value === undefined) return 'string';
        if (typeof value === 'number') return 'number';
        if (typeof value === 'boolean') return 'boolean';
        if (Array.isArray(value)) return 'array';
        if (typeof value === 'object') return 'object';
        return 'string';
    }

    function convertValueToType(value, toType) {
        switch (toType) {
            case 'number':
                const n = Number(value);
                return isNaN(n) ? 0 : n;
            case 'boolean':
                if (typeof value === 'boolean') return value;
                if (typeof value === 'string') return value.toLowerCase() === 'true' || value === '1';
                return Boolean(value);
            case 'array':
                if (Array.isArray(value)) return value;
                try { return JSON.parse(typeof value === 'string' ? value : JSON.stringify(value)); } catch { return []; }
            case 'object':
                if (typeof value === 'object' && value !== null && !Array.isArray(value)) return value;
                try { return JSON.parse(typeof value === 'string' ? value : JSON.stringify(value)); } catch { return {}; }
            default:
                if (typeof value === 'object' && value !== null) return JSON.stringify(value);
                return String(value ?? '');
        }
    }

    function setBreadcrumb(docId) {
        const el = document.getElementById('editor-breadcrumb');
        if (!el) return;
        const db = escapeHtml(window.currentDatabase);
        const col = escapeHtml(window.currentCollection);
        const idShort = docId ? escapeHtml(String(docId).substring(0, 12) + (docId.length > 12 ? '...' : '')) : '';
        el.innerHTML = '<span>' + db + '</span><i class="fas fa-chevron-right text-[8px]"></i><span>' + col + '</span><i class="fas fa-chevron-right text-[8px]"></i><span class="text-blue-500 dark:text-blue-400 font-mono">' + idShort + '</span>';
    }

    async function init() {
        const docId = window.currentEditingDocumentId;
        if (!docId) { closeEditor(); return; }

        setBreadcrumb(docId);
        Object.keys(fieldTypes).forEach(k => delete fieldTypes[k]);

        const container = document.getElementById('editor-fields-container');
        try {
            const result = await eel.get_document(
                window.currentConnection.name, window.currentDatabase,
                window.currentCollection, docId
            )();
            if (result.success) {
                currentDocumentData = JSON.parse(result.document_json);
                renderEditorFields(currentDocumentData);
            } else {
                container.innerHTML = '<div class="max-w-4xl mx-auto"><div class="alert alert-danger">' + escapeHtml(result.message) + '</div></div>';
            }
        } catch (e) {
            container.innerHTML = '<div class="max-w-4xl mx-auto"><div class="alert alert-danger">Error loading document</div></div>';
        }
    }

    function getValueStr(value) {
        if (value === null || value === undefined) return '';
        if (typeof value === 'object') return JSON.stringify(value, null, 2);
        return String(value);
    }

    function renderEditorFields(docData) {
        const container = document.getElementById('editor-fields-container');
        const idVal = docData._id != null ? getValueStr(docData._id) : '';
        const idEscaped = escapeHtml(idVal);

        let cardInner = '';
        if (docData._id !== undefined) {
            cardInner += '<div class="bg-gray-50 dark:bg-gray-700/50 px-8 py-4 border-b border-gray-100 dark:border-gray-600 flex items-center justify-between">';
            cardInner += '<div class="flex items-center gap-3"><span class="text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest leading-none">Object ID</span>';
            cardInner += '<code class="text-sm text-blue-600 dark:text-blue-400 font-medium mono bg-blue-50 dark:bg-blue-900/40 px-2 py-1 rounded">' + idEscaped + '</code></div>';
            cardInner += '<i class="fas fa-lock text-gray-300 dark:text-gray-500 text-xs"></i></div>';
        }

        const keys = Object.keys(docData).filter(k => k !== '_id');
        const types = ['string', 'number', 'boolean', 'array', 'object'];
        const typeLabels = { string: 'String', number: 'Number', boolean: 'Boolean', array: 'Array', object: 'Object' };
        const fieldRows = keys.map((key) => {
            const value = docData[key];
            const type = fieldTypes[key] || inferType(value);
            const valueStr = getValueStr(value);
            const escapedKey = escapeAttr(key);
            const safeKey = safeIdKey(key);
            const isMultiline = type === 'array' || type === 'object' || (type === 'string' && valueStr.length > 80);
            const rowClass = isMultiline ? 'flex items-start px-8 py-4 hover:bg-gray-50/50 dark:hover:bg-gray-700/50 transition group' : 'flex items-center px-8 py-4 hover:bg-gray-50/50 dark:hover:bg-gray-700/50 transition group';
            const labelClass = isMultiline ? 'w-1/4 text-sm font-semibold text-slate-500 dark:text-gray-400 pt-2 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition' : 'w-1/4 text-sm font-semibold text-slate-500 dark:text-gray-400 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition';
            const inputClass = 'flex-1 p-2 bg-transparent border-b border-transparent focus:border-blue-500 focus:outline-none text-sm mono transition text-gray-900 dark:text-gray-200 min-w-0';
            const btnClass = 'opacity-0 group-hover:opacity-100 transition px-3 py-1 text-[10px] font-bold rounded-md uppercase flex-shrink-0';
            const btnExtra = isMultiline ? ' mt-2' : '';

            let typeSelectHtml = types.map(function (t) { return '<option value="' + t + '"' + (t === type ? ' selected' : '') + '>' + typeLabels[t] + '</option>'; }).join('');
            let typeSelect = '<select class="text-[10px] font-bold uppercase tracking-tighter bg-gray-100 dark:bg-gray-600 text-gray-700 dark:text-gray-300 rounded px-2 py-1 border-0 cursor-pointer" data-field-key="' + escapedKey + '" onchange="window._editorChangeType(this)">' + typeSelectHtml + '</select>';

            let inputEl;
            if (type === 'number') {
                const numVal = typeof value === 'number' ? value : (Number(value) || 0);
                inputEl = '<input type="number" id="field-' + safeKey + '" value="' + escapeAttr(String(numVal)) + '" class="' + inputClass + '" data-field-key="' + escapedKey + '">';
            } else if (type === 'boolean') {
                const boolVal = typeof value === 'boolean' ? value : (String(value).toLowerCase() === 'true' || value === '1');
                inputEl = '<select id="field-' + safeKey + '" class="' + inputClass + ' w-auto min-w-[80px]" data-field-key="' + escapedKey + '"><option value="true"' + (boolVal ? ' selected' : '') + '>true</option><option value="false"' + (!boolVal ? ' selected' : '') + '>false</option></select>';
            } else if (type === 'array' || type === 'object') {
                inputEl = '<textarea id="field-' + safeKey + '" rows="4" class="' + inputClass + ' resize-none" data-field-key="' + escapedKey + '">' + escapeHtml(valueStr) + '</textarea>';
            } else {
                inputEl = '<input type="text" id="field-' + safeKey + '" value="' + escapeAttr(typeof value === 'string' ? value : valueStr) + '" class="' + inputClass + '" data-field-key="' + escapedKey + '">';
            }

            const updateBtn = '<button type="button" class="' + btnClass + ' text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/40' + btnExtra + '" onclick="window._editorUpdateField(this)">Update</button>';
            const deleteBtn = '<button type="button" class="' + btnClass + ' text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/40' + btnExtra + '" onclick="window._editorDeleteField(this)" title="Delete field"><i class="fas fa-trash-alt"></i></button>';
            const valueWrapClass = isMultiline ? 'flex-1 flex items-start gap-2 flex-wrap' : 'flex-1 flex items-center gap-2 flex-wrap';
            return '<div class="' + rowClass + '" data-field-key="' + escapedKey + '" data-field-type="' + escapeAttr(type) + '">' +
                '<label class="' + labelClass + '">' + escapeHtml(key) + '</label>' +
                '<div class="' + valueWrapClass + '">' + typeSelect + inputEl + updateBtn + deleteBtn + '</div></div>';
        }).join('');

        cardInner += '<div class="divide-y divide-gray-50 dark:divide-gray-600">' + fieldRows + '</div>';

        container.innerHTML = '<div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-600 shadow-sm overflow-hidden">' + cardInner + '</div>';
    }

    window._editorChangeType = function (selectEl) {
        const fieldKey = selectEl.getAttribute('data-field-key');
        const newType = selectEl.value;
        const row = selectEl.closest('[data-field-key]');
        const inputEl = row.querySelector('input, textarea, select');
        let currentVal = currentDocumentData[fieldKey];
        if (inputEl && (inputEl.tagName === 'INPUT' || inputEl.tagName === 'TEXTAREA')) {
            const raw = inputEl.value;
            if (newType === 'number') currentVal = raw;
            else if (newType === 'boolean') currentVal = raw;
            else if (newType === 'string') currentVal = raw;
            else if (newType === 'array' || newType === 'object') { try { currentVal = JSON.parse(raw); } catch { currentVal = newType === 'array' ? [] : {}; } }
        }
        fieldTypes[fieldKey] = newType;
        currentDocumentData[fieldKey] = convertValueToType(currentVal, newType);
        renderEditorFields(currentDocumentData);
    };

    window._editorUpdateField = async function (btnElement) {
        const row = btnElement.closest('[data-field-key]');
        if (!row) return;
        const fieldKey = row.getAttribute('data-field-key');
        const fieldType = row.getAttribute('data-field-type') || 'string';
        const inputEl = row.querySelector('input, textarea, select');
        if (!inputEl || !window.currentEditingDocumentId) return;
        const rawValue = inputEl.tagName === 'SELECT' ? inputEl.value : inputEl.value;
        let valueJsonStr;
        if (fieldType === 'number') {
            const n = Number(rawValue);
            valueJsonStr = String(isNaN(n) ? 0 : n);
        } else if (fieldType === 'boolean') {
            valueJsonStr = rawValue === 'true' ? 'true' : 'false';
        } else if (fieldType === 'array' || fieldType === 'object') {
            try {
                const parsed = JSON.parse(rawValue);
                valueJsonStr = JSON.stringify(parsed);
            } catch {
                valueJsonStr = JSON.stringify(rawValue);
            }
        } else {
            try { JSON.parse(rawValue); valueJsonStr = rawValue; } catch { valueJsonStr = JSON.stringify(rawValue); }
        }

        const originalText = btnElement.innerHTML;
        btnElement.innerHTML = '...';
        btnElement.disabled = true;
        try {
            const result = await eel.update_document_field(
                window.currentConnection.name, window.currentDatabase,
                window.currentCollection, window.currentEditingDocumentId,
                fieldKey, valueJsonStr
            )();
            if (result.success) {
                try { currentDocumentData[fieldKey] = JSON.parse(valueJsonStr); } catch { currentDocumentData[fieldKey] = rawValue; }
                btnElement.innerHTML = 'OK';
                btnElement.classList.add('bg-green-100', 'dark:bg-green-900/40', 'text-green-700', 'dark:text-green-300');
                setTimeout(function () {
                    btnElement.innerHTML = originalText;
                    btnElement.classList.remove('bg-green-100', 'dark:bg-green-900/40', 'text-green-700', 'dark:text-green-300');
                    btnElement.disabled = false;
                }, 1500);
            } else {
                btnElement.innerHTML = originalText;
                btnElement.disabled = false;
                window.showAlert('Failed: ' + result.message, 'Error', 'error');
            }
        } catch (e) {
            btnElement.innerHTML = originalText;
            btnElement.disabled = false;
            window.showAlert('Error: ' + String(e.message || e), 'Error', 'error');
        }
    };

    window._editorDeleteField = async function (btnElement) {
        const row = btnElement.closest('[data-field-key]');
        if (!row) return;
        const fieldKey = row.getAttribute('data-field-key');
        if (!window.currentEditingDocumentId || !currentDocumentData || fieldKey === '_id') return;
        if (!confirm('Delete field "' + fieldKey + '"?')) return;
        const originalHtml = btnElement.innerHTML;
        btnElement.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
        btnElement.disabled = true;
        try {
            const result = await eel.unset_document_field(
                window.currentConnection.name, window.currentDatabase,
                window.currentCollection, window.currentEditingDocumentId,
                fieldKey
            )();
            if (result.success) {
                delete currentDocumentData[fieldKey];
                delete fieldTypes[fieldKey];
                renderEditorFields(currentDocumentData);
            } else {
                window.showAlert('Failed: ' + result.message, 'Error', 'error');
            }
        } catch (e) {
            window.showAlert('Error: ' + String(e.message || e), 'Error', 'error');
        }
        btnElement.innerHTML = originalHtml;
        btnElement.disabled = false;
    };

    window.saveAllFields = function () {
        window.showAlert('Use the Update button on each field to save one field at a time', 'Save all', 'info');
    };

    window.sortEditorFields = function () {
        if (!currentDocumentData) return;
        const sorted = {};
        if (currentDocumentData._id !== undefined) sorted._id = currentDocumentData._id;
        Object.keys(currentDocumentData).filter(k => k !== '_id').sort().forEach(k => { sorted[k] = currentDocumentData[k]; });
        currentDocumentData = sorted;
        renderEditorFields(currentDocumentData);
    };

    window.sortEditorFieldsZA = function () {
        if (!currentDocumentData) return;
        const sorted = {};
        if (currentDocumentData._id !== undefined) sorted._id = currentDocumentData._id;
        Object.keys(currentDocumentData).filter(k => k !== '_id').sort().reverse().forEach(k => { sorted[k] = currentDocumentData[k]; });
        currentDocumentData = sorted;
        renderEditorFields(currentDocumentData);
    };

    window.updateField = async function (fieldKey, btnElement) {
        window._editorUpdateField(btnElement);
    };

    window.closeEditor = function () {
        window.currentEditingDocumentId = null;
        window._navigate('data');
    };

    init();
})();
</script>
