<!-- P2-C · Document Editor View -->
<!-- State read from window: currentConnection, currentDatabase, currentCollection, currentEditingDocumentId -->

<style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
    .mono { font-family: 'JetBrains Mono', monospace; }
    .editor-scrollbar::-webkit-scrollbar { width: 6px; }
    .editor-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
</style>

<div class="flex flex-col flex-1 min-h-0 overflow-hidden">
    <header class="bg-white border-b border-gray-200 px-8 py-4 flex items-center justify-between flex-shrink-0" id="editor-header">
        <div class="flex flex-col">
            <div class="flex items-center gap-2 text-xs text-gray-400 mb-1" id="editor-breadcrumb"></div>
            <h2 class="text-xl font-bold text-slate-800">แก้ไข Document</h2>
        </div>
        <div class="flex items-center gap-2">
            <button type="button" class="px-4 py-2 text-sm font-bold text-gray-500 hover:bg-gray-100 rounded-lg transition" onclick="sortEditorFields()">
                <i class="fas fa-sort-alpha-down mr-2"></i>A-Z
            </button>
            <button type="button" class="px-4 py-2 text-sm font-bold bg-white border border-gray-200 text-slate-700 hover:bg-gray-50 rounded-lg transition shadow-sm" id="editor-save-all-btn" onclick="window.saveAllFields && window.saveAllFields()">
                <i class="fas fa-save mr-2 text-blue-500"></i>บันทึกทั้งหมด
            </button>
            <button type="button" class="px-4 py-2 text-sm font-bold bg-red-50 text-red-600 hover:bg-red-100 rounded-lg transition" onclick="closeEditor()">
                <i class="fas fa-times mr-2"></i>ปิด
            </button>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto editor-scrollbar p-8 min-h-0" id="editor-fields-container">
        <div class="loading flex items-center justify-center py-12">
            <div class="text-center text-gray-500">
                <div class="spinner"></div>
                <p class="mt-2">กำลังโหลดข้อมูล Document...</p>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    let currentDocumentData = null;

    function escapeHtml(s) {
        if (s === null || s === undefined) return '';
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function escapeAttr(s) {
        if (s === null || s === undefined) return '';
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function safeIdKey(key) {
        return String(key).replace(/[^a-zA-Z0-9_-]/g, '_');
    }

    function setBreadcrumb(docId) {
        const el = document.getElementById('editor-breadcrumb');
        if (!el) return;
        const db = escapeHtml(window.currentDatabase);
        const col = escapeHtml(window.currentCollection);
        const idShort = docId ? escapeHtml(String(docId).substring(0, 12) + (docId.length > 12 ? '...' : '')) : '';
        el.innerHTML = '<span>' + db + '</span><i class="fas fa-chevron-right text-[8px]"></i><span>' + col + '</span><i class="fas fa-chevron-right text-[8px]"></i><span class="text-blue-500 font-mono">' + idShort + '</span>';
    }

    async function init() {
        const docId = window.currentEditingDocumentId;
        if (!docId) { closeEditor(); return; }

        setBreadcrumb(docId);

        const container = document.getElementById('editor-fields-container');
        try {
            const result = await eel.get_document(
                window.currentConnection.name, window.currentDatabase,
                window.currentCollection, docId
            )();
            if (result.success) {
                currentDocumentData = JSON.parse(result.document_json);
                renderEditorFields(currentDocumentData);
            } else {
                container.innerHTML = '<div class="max-w-4xl mx-auto"><div class="alert alert-danger">' + escapeHtml(result.message) + '</div></div>';
            }
        } catch (e) {
            container.innerHTML = '<div class="max-w-4xl mx-auto"><div class="alert alert-danger">เกิดข้อผิดพลาดในการดึงข้อมูล Document</div></div>';
        }
    }

    function getValueStr(value) {
        if (value === null || value === undefined) return '';
        if (typeof value === 'object') return JSON.stringify(value, null, 2);
        return String(value);
    }

    function renderEditorFields(docData) {
        const container = document.getElementById('editor-fields-container');
        const idVal = docData._id != null ? getValueStr(docData._id) : '';
        const idEscaped = escapeHtml(idVal);

        let cardInner = '';
        if (docData._id !== undefined) {
            cardInner += '<div class="bg-gray-50 px-8 py-4 border-b border-gray-100 flex items-center justify-between">';
            cardInner += '<div class="flex items-center gap-3"><span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest leading-none">Object ID</span>';
            cardInner += '<code class="text-sm text-blue-600 font-medium mono bg-blue-50 px-2 py-1 rounded">' + idEscaped + '</code></div>';
            cardInner += '<i class="fas fa-lock text-gray-300 text-xs"></i></div>';
        }

        const keys = Object.keys(docData).filter(k => k !== '_id');
        const fieldRows = keys.map((key, index) => {
            const value = docData[key];
            const valueStr = getValueStr(value);
            const escapedVal = escapeAttr(valueStr);
            const escapedKey = escapeAttr(key);
            const safeKey = safeIdKey(key);
            const isMultiline = (typeof value === 'object' && value !== null) || valueStr.length > 80;
            const isNumber = typeof value === 'number';
            const rowClass = isMultiline ? 'flex items-start px-8 py-4 hover:bg-gray-50/50 transition group' : 'flex items-center px-8 py-4 hover:bg-gray-50/50 transition group';
            const labelClass = isMultiline ? 'w-1/4 text-sm font-semibold text-slate-500 pt-2 group-hover:text-blue-600 transition' : 'w-1/4 text-sm font-semibold text-slate-500 group-hover:text-blue-600 transition';
            const inputClass = 'flex-1 p-2 bg-transparent border-b border-transparent focus:border-blue-500 focus:outline-none text-sm mono transition';
            const btnClass = 'opacity-0 group-hover:opacity-100 transition px-3 py-1 text-[10px] font-bold text-blue-600 bg-blue-50 rounded-md uppercase';
            const btnExtra = isMultiline ? ' mt-2' : '';

            let typeBadge = '';
            if (isNumber) typeBadge = '<span class="text-[10px] text-gray-300 font-bold uppercase tracking-tighter">Number</span>';

            let inputEl;
            if (isMultiline) {
                inputEl = '<textarea id="field-' + safeKey + '" rows="4" class="' + inputClass + ' resize-none" data-field-key="' + escapedKey + '">' + escapeHtml(valueStr) + '</textarea>';
            } else if (isNumber) {
                inputEl = '<input type="number" id="field-' + safeKey + '" value="' + escapedVal + '" class="' + inputClass + '" data-field-key="' + escapedKey + '">';
            } else {
                inputEl = '<input type="text" id="field-' + safeKey + '" value="' + escapedVal + '" class="' + inputClass + '" data-field-key="' + escapedKey + '">';
            }

            const updateBtn = '<button type="button" class="' + btnClass + btnExtra + '" onclick="window._editorUpdateField(this)">Update</button>';
            const valueWrapClass = isMultiline ? 'flex-1 flex items-start gap-3' : 'flex-1 flex items-center gap-3';
            return '<div class="' + rowClass + '" data-field-key="' + escapedKey + '">' +
                '<label class="' + labelClass + '">' + escapeHtml(key) + '</label>' +
                '<div class="' + valueWrapClass + '">' + inputEl + typeBadge + updateBtn + '</div></div>';
        }).join('');

        cardInner += '<div class="divide-y divide-gray-50">' + fieldRows + '</div>';

        container.innerHTML = '<div class="max-w-4xl mx-auto bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">' + cardInner + '</div>';
    }

    window._editorUpdateField = async function (btnElement) {
        const row = btnElement.closest('[data-field-key]');
        if (!row) return;
        const fieldKey = row.getAttribute('data-field-key');
        const inputEl = row.querySelector('input, textarea');
        if (!inputEl || !window.currentEditingDocumentId) return;
        const rawValue = inputEl.value;
        let valueJsonStr;
        try { JSON.parse(rawValue); valueJsonStr = rawValue; } catch { valueJsonStr = JSON.stringify(rawValue); }

        const originalText = btnElement.innerHTML;
        btnElement.innerHTML = '...';
        btnElement.disabled = true;
        try {
            const result = await eel.update_document_field(
                window.currentConnection.name, window.currentDatabase,
                window.currentCollection, window.currentEditingDocumentId,
                fieldKey, valueJsonStr
            )();
            if (result.success) {
                try { currentDocumentData[fieldKey] = JSON.parse(valueJsonStr); } catch { currentDocumentData[fieldKey] = rawValue; }
                btnElement.innerHTML = 'OK';
                btnElement.classList.add('bg-green-100', 'text-green-700');
                setTimeout(function () {
                    btnElement.innerHTML = originalText;
                    btnElement.classList.remove('bg-green-100', 'text-green-700');
                    btnElement.disabled = false;
                }, 1500);
            } else {
                btnElement.innerHTML = originalText;
                btnElement.disabled = false;
                window.showAlert('ล้มเหลว: ' + result.message, 'ผิดพลาด', 'error');
            }
        } catch (e) {
            btnElement.innerHTML = originalText;
            btnElement.disabled = false;
            window.showAlert('เกิดข้อผิดพลาด: ' + String(e.message || e), 'ผิดพลาด', 'error');
        }
    };

    window.saveAllFields = function () {
        window.showAlert('ใช้ปุ่ม Update ที่แต่ละฟิลด์เพื่อบันทึกทีละฟิลด์', 'บันทึกทั้งหมด', 'info');
    };

    window.sortEditorFields = function () {
        if (!currentDocumentData) return;
        const sorted = {};
        if (currentDocumentData._id !== undefined) sorted._id = currentDocumentData._id;
        Object.keys(currentDocumentData).filter(k => k !== '_id').sort().forEach(k => { sorted[k] = currentDocumentData[k]; });
        currentDocumentData = sorted;
        renderEditorFields(currentDocumentData);
    };

    window.sortEditorFieldsZA = function () {
        if (!currentDocumentData) return;
        const sorted = {};
        if (currentDocumentData._id !== undefined) sorted._id = currentDocumentData._id;
        Object.keys(currentDocumentData).filter(k => k !== '_id').sort().reverse().forEach(k => { sorted[k] = currentDocumentData[k]; });
        currentDocumentData = sorted;
        renderEditorFields(currentDocumentData);
    };

    window.updateField = async function (fieldKey, btnElement) {
        window._editorUpdateField(btnElement);
    };

    window.closeEditor = function () {
        window.currentEditingDocumentId = null;
        window._navigate('data');
    };

    init();
})();
</script>
