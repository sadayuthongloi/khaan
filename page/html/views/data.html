<!-- P2-B · Data Table View -->
<!-- State read from window: currentConnection, currentDatabase, currentCollection -->

<style>
    .data-table-row:hover { background-color: #f1f5f9; }
    .data-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
    .data-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
</style>

<!-- Search Toolbar (P2-B sample style) -->
<div class="bg-white border-b border-gray-200 p-4 shadow-sm" id="search-form" style="display: none;">
    <div class="flex flex-wrap items-end gap-4">
        <div class="flex-1 min-w-[150px]">
            <label for="search-field" class="block text-[11px] font-bold text-gray-400 uppercase mb-1 ml-1">ฟิลด์</label>
            <select id="search-field" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500/20 outline-none">
                <option value="">เลือกฟิลด์</option>
            </select>
        </div>
        <div class="flex-1 min-w-[150px]">
            <label for="search-operator" class="block text-[11px] font-bold text-gray-400 uppercase mb-1 ml-1">เงื่อนไข</label>
            <select id="search-operator" class="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500/20 outline-none">
                <option value="">เลือกเงื่อนไข</option>
                <option value="=">เท่ากับ (=)</option>
                <option value="like">ประกอบด้วย (Like)</option>
            </select>
        </div>
        <div class="flex-[2] min-w-[200px]">
            <label for="search-value" class="block text-[11px] font-bold text-gray-400 uppercase mb-1 ml-1">ค่าที่ต้องการค้นหา</label>
            <input type="text" id="search-value" placeholder="กรอกคำค้นหา..." class="w-full p-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500/20 outline-none">
        </div>
        <div class="flex gap-2">
            <button type="button" class="px-5 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 transition flex items-center gap-2 shadow-sm" onclick="performSearch()">
                <i class="fas fa-search"></i> ค้นหา
            </button>
            <button type="button" class="px-5 py-2 bg-gray-100 text-gray-600 rounded-lg text-sm font-bold hover:bg-gray-200 transition" onclick="clearSearch()" title="ล้างการค้นหา">
                <i class="fas fa-redo-alt"></i>
            </button>
            <button type="button" id="sort-btn" class="px-5 py-2 border border-gray-200 text-gray-600 rounded-lg text-sm font-bold hover:bg-gray-50 transition flex items-center gap-2" onclick="toggleSort()" title="เรียงใหม่สุด → เก่าสุด">
                <i class="fas fa-sort-amount-down"></i> Z → A
            </button>
        </div>
    </div>
</div>

<!-- Data Content -->
<div class="data-content flex-1 flex flex-col overflow-hidden min-h-0" id="data-content">
    <div class="loading flex items-center justify-center flex-1">
        <div class="text-center">
            <div class="spinner"></div>
            <p class="mt-2 text-gray-500">กำลังโหลดข้อมูล...</p>
        </div>
    </div>
</div>

<script>
(function () {
    let currentFields = [];
    let lastLoadedData = [];
    let sortDesc = false;

    function escapeHtml(s) {
        if (s === null || s === undefined) return '';
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function escapeAttr(s) {
        if (s === null || s === undefined) return '';
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function setHeaderTitle(db, collection) {
        const el = document.getElementById('data-title');
        if (!el) return;
        el.innerHTML = '<div class="flex items-center gap-2 text-sm"><span class="text-gray-400">' + escapeHtml(db) + '</span><i class="fas fa-chevron-right text-[10px] text-gray-300"></i><span class="font-bold text-slate-800 text-lg">' + escapeHtml(collection) + '</span></div>';
    }

    function setHeaderStats(count) {
        const el = document.getElementById('data-stats');
        if (!el) return;
        el.innerHTML = '<span class="ml-2 px-2 py-0.5 bg-gray-100 text-gray-500 rounded text-[11px]">' + escapeHtml(String(count)) + ' เอกสาร</span>';
    }

    async function init() {
        if (!window.currentCollection) return;
        setHeaderTitle(window.currentDatabase, window.currentCollection);
        setHeaderStats('');
        document.getElementById('search-form').style.display = 'none';
        document.getElementById('delete-btn').style.display = 'none';

        await loadData(50);
        await loadCollectionFields(window.currentCollection);
    }

    async function loadData(limit, searchField = '', searchOp = '', searchVal = '') {
        document.getElementById('data-content').innerHTML = `
            <div class="loading flex items-center justify-center flex-1">
                <div class="text-center">
                    <div class="spinner"></div>
                    <p class="mt-2 text-gray-500">กำลังโหลดข้อมูล...</p>
                </div>
            </div>
        `;
        try {
            const result = await eel.get_collection_data(
                window.currentConnection.name, window.currentDatabase,
                window.currentCollection, limit, searchField, searchOp, searchVal
            )();
            if (result.success) {
                lastLoadedData = result.data;
                const toShow = sortDesc ? [...lastLoadedData].reverse() : lastLoadedData;
                displayData(toShow);
            } else {
                document.getElementById('data-content').innerHTML = '<div class="flex-1 flex items-center justify-center p-8"><div class="alert alert-danger">' + escapeHtml(result.message) + '</div></div>';
            }
        } catch (e) {
            document.getElementById('data-content').innerHTML = '<div class="flex-1 flex items-center justify-center p-8"><div class="alert alert-danger">เกิดข้อผิดพลาดในการโหลดข้อมูล</div></div>';
        }
    }

    function formatValue(value, fieldName) {
        if (value === null || value === undefined) return '<span class="text-xs italic text-gray-300">null</span>';
        if (Array.isArray(value)) return '<span class="text-xs italic text-gray-400">[array]</span>';
        if (typeof value === 'object') return '<span class="text-xs italic text-gray-400">[object]</span>';
        const str = String(value);
        const escaped = escapeHtml(str.length > 100 ? str.substring(0, 100) + '...' : str);
        if (fieldName === '_id') return '<span class="text-xs font-mono text-blue-600 bg-blue-50/30">' + escaped + '</span>';
        return '<span class="text-sm text-slate-700">' + escaped + '</span>';
    }

    function displayData(data) {
        const container = document.getElementById('data-content');
        if (data.length === 0) {
            container.innerHTML = '<div class="flex-1 flex items-center justify-center min-h-0"><p class="text-gray-400 text-sm">ไม่มีข้อมูลใน collection นี้</p></div>';
            setHeaderStats(0);
            document.getElementById('delete-btn').style.display = 'none';
            return;
        }

        setHeaderStats(data.length);
        document.getElementById('search-form').style.display = 'block';
        document.getElementById('delete-btn').style.display = 'inline-block';

        const fields = Object.keys(data[0]);
        const theadRow = '<tr class="bg-gray-50/50 text-[11px] uppercase tracking-wider text-gray-400 border-b border-gray-100">' +
            fields.map(f => '<th class="px-6 py-4 font-bold">' + escapeHtml(f) + '</th>').join('') + '</tr>';
        const rows = data.map(doc => {
            const docId = doc._id != null ? String(doc._id) : '';
            const docIdAttr = escapeAttr(docId);
            return '<tr class="data-table-row transition group cursor-pointer" data-doc-id="' + docIdAttr + '" ondblclick="window._editDocument(this.dataset.docId)" title="ดับเบิลคลิกเพื่อดู/แก้ไขข้อมูล">' +
                fields.map(f => '<td class="px-6 py-4">' + formatValue(doc[f], f) + '</td>').join('') + '</tr>';
        }).join('');

        const n = data.length;
        const footerLeft = 'แสดง 1–' + n + ' ของ ' + n + ' เอกสาร';
        const footerRight = '<button type="button" class="w-8 h-8 flex items-center justify-center rounded border border-gray-200 bg-blue-600 text-white shadow-sm text-xs">1</button>';

        container.innerHTML = `
            <div class="flex-1 overflow-auto data-scrollbar p-6 min-h-0">
                <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden min-w-max">
                    <table class="w-full text-left border-collapse">
                        <thead>${theadRow}</thead>
                        <tbody class="divide-y divide-gray-50">${rows}</tbody>
                    </table>
                </div>
            </div>
            <footer class="bg-white border-t border-gray-200 px-6 py-3 flex items-center justify-between text-xs text-gray-500 flex-shrink-0">
                <div>${escapeHtml(footerLeft)}</div>
                <div class="flex gap-1">${footerRight}</div>
            </footer>
        `;
    }

    async function loadCollectionFields(collectionName) {
        try {
            const result = await eel.get_collection_fields(window.currentConnection.name, window.currentDatabase, collectionName)();
            if (result.success) {
                currentFields = result.fields;
                const sel = document.getElementById('search-field');
                if (sel) {
                    sel.innerHTML = '<option value="">เลือกฟิลด์</option>';
                    result.fields.forEach(f => {
                        const opt = document.createElement('option');
                        opt.value = f;
                        opt.textContent = f;
                        sel.appendChild(opt);
                    });
                }
            }
        } catch (e) { console.error(e); }
    }

    window.performSearch = async function () {
        const field = document.getElementById('search-field').value;
        const op = document.getElementById('search-operator').value;
        const val = document.getElementById('search-value').value;
        if (!field || !op || !val) { window.showAlert('กรุณากรอกข้อมูลการค้นหาให้ครบถ้วน', 'แจ้งเตือน', 'warning'); return; }
        await loadData(50, field, op, val);
    };

    window.clearSearch = async function () {
        document.getElementById('search-field').value = '';
        document.getElementById('search-operator').value = '';
        document.getElementById('search-value').value = '';
        await loadData(50);
    };

    window.toggleSort = function () {
        sortDesc = !sortDesc;
        const btn = document.getElementById('sort-btn');
        if (btn) {
            if (sortDesc) {
                btn.innerHTML = '<i class="fas fa-sort-amount-up"></i> A → Z';
                btn.title = 'เรียงเก่าสุด → ใหม่สุด (คลิกเพื่อสลับกลับ)';
                btn.className = 'px-5 py-2 bg-gray-100 text-gray-600 rounded-lg text-sm font-bold hover:bg-gray-200 transition flex items-center gap-2';
            } else {
                btn.innerHTML = '<i class="fas fa-sort-amount-down"></i> Z → A';
                btn.title = 'เรียงใหม่สุด → เก่าสุด';
                btn.className = 'px-5 py-2 border border-gray-200 text-gray-600 rounded-lg text-sm font-bold hover:bg-gray-50 transition flex items-center gap-2';
            }
        }
        const toShow = sortDesc ? [...lastLoadedData].reverse() : lastLoadedData;
        displayData(toShow);
    };

    window._editDocument = function (documentId) {
        window.currentEditingDocumentId = documentId;
        window._navigate('editor');
    };

    window._showDeleteModal = function () {
        if (!window.currentCollection) return;
        document.getElementById('modal-collection-name').textContent = window.currentCollection;
        document.getElementById('confirm-collection-name').value = '';
        document.getElementById('delete-modal').style.display = 'flex';
        document.getElementById('confirm-collection-name').focus();
    };

    window._hideDeleteModal = function () {
        document.getElementById('delete-modal').style.display = 'none';
    };

    window._confirmDelete = async function () {
        const confirmName = document.getElementById('confirm-collection-name').value.trim();
        if (!confirmName) { window.showAlert('กรุณากรอกชื่อ collection เพื่อยืนยัน', 'แจ้งเตือน', 'warning'); return; }
        try {
            const result = await eel.clear_collection(
                window.currentConnection.name, window.currentDatabase,
                window.currentCollection, confirmName
            )();
            if (result.success) {
                window.showAlert(result.message, 'สำเร็จ', 'success');
                window._hideDeleteModal();
                await loadData(50);
            } else {
                window.showAlert(result.message, 'ผิดพลาด', 'error');
            }
        } catch (e) {
            window.showAlert('เกิดข้อผิดพลาดในการล้างข้อมูล', 'ผิดพลาด', 'error');
        }
    };

    const deleteModal = document.getElementById('delete-modal');
    if (deleteModal) {
        deleteModal.addEventListener('click', function (e) { if (e.target === this) window._hideDeleteModal(); });
        const confirmInput = document.getElementById('confirm-collection-name');
        if (confirmInput) confirmInput.addEventListener('keypress', e => { if (e.key === 'Enter') window._confirmDelete(); });
    }

    init();
})();
</script>
