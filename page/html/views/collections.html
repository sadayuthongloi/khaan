<!-- P2-A · Collections View -->
<!-- State read from window: currentConnection, currentDatabase -->
<!-- State written: currentCollection -->

<style>
    .collection-scrollbar::-webkit-scrollbar { width: 6px; }
    .collection-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .collection-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    html.dark .collection-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; }
</style>

<div class="data-content flex flex-col overflow-hidden min-h-0" id="collections-view">
    <!-- Rendered by displayCollections() -->
</div>

<script>
(function () {
    let allCollections = [];
    let filterText = '';

    function escapeHtml(s) {
        if (!s) return '';
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/"/g, '&quot;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }

    function renderTableRows(collections) {
        const tbody = document.getElementById('collections-tbody');
        if (!tbody) return;
        if (collections.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-8 text-center text-gray-400 dark:text-gray-500 text-sm">No collections match your search</td></tr>';
            return;
        }
        const rows = collections.map(col => `
            <tr class="hover:bg-blue-50/30 dark:hover:bg-gray-700 transition group cursor-pointer" data-collection="${escapeHtml(col)}">
                <td class="px-6 py-4 text-center">
                    <input type="checkbox" class="collection-checkbox rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500" data-collection="${escapeHtml(col)}" onclick="event.stopPropagation(); window._collectionsOnCheckboxChange && window._collectionsOnCheckboxChange(event)">
                </td>
                <td class="px-6 py-4">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-400 dark:text-gray-500 group-hover:bg-blue-100 dark:group-hover:bg-gray-600 group-hover:text-blue-500 dark:group-hover:text-blue-400 transition">
                            <i class="fas fa-table text-xs"></i>
                        </div>
                        <span class="text-sm font-medium text-slate-700 dark:text-gray-200">${escapeHtml(col)}</span>
                    </div>
                </td>
                <td class="px-6 py-4 text-right">
                    <button type="button" class="text-xs font-semibold text-blue-600 dark:text-blue-400 hover:underline" onclick="event.stopPropagation(); window._selectCollection(this.closest('tr').dataset.collection)">View data</button>
                </td>
            </tr>
        `).join('');
        tbody.innerHTML = rows;
    }

    function applyFilter() {
        const q = filterText.trim().toLowerCase();
        const filtered = q ? allCollections.filter(c => c.toLowerCase().includes(q)) : allCollections;
        renderTableRows(filtered);
    }

    function updateDelButton() {
        const checked = document.querySelectorAll('#collections-view .collection-checkbox:checked');
        const btn = document.getElementById('btn-del-collections');
        if (!btn) return;
        if (checked.length > 0) {
            btn.classList.remove('hidden');
            btn.querySelector('.btn-del-count').textContent = checked.length > 0 ? ` (${checked.length})` : '';
        } else {
            btn.classList.add('hidden');
        }
    }

    window._collectionsOnCheckboxChange = function (event) {
        event.stopPropagation();
        updateDelButton();
    };

    window._collectionsToggleAll = function (event) {
        document.querySelectorAll('#collections-view .collection-checkbox').forEach(cb => { cb.checked = event.target.checked; });
        updateDelButton();
    };

    async function loadCollections() {
        if (!window.currentDatabase) return;

        const container = document.getElementById('collections-view');
        container.innerHTML = `
            <div class="flex-1 flex flex-col overflow-hidden p-6 md:p-8">
                <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-600 shadow-sm flex-1 flex flex-col overflow-hidden flex items-center justify-center">
                    <div class="loading text-center text-gray-500 dark:text-gray-400">
                        <div class="spinner"></div>
                        Loading collections...
                    </div>
                </div>
            </div>
        `;

        try {
            const result = await eel.get_collections(window.currentConnection.name, window.currentDatabase)();
            if (result.success) {
                displayCollections(result.collections);
            } else {
                container.innerHTML = `
                    <div class="flex-1 flex flex-col overflow-hidden p-6 md:p-8">
                        <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-600 shadow-sm flex-1 flex items-center justify-center p-8">
                            <div class="alert alert-danger">${escapeHtml(result.message)}</div>
                        </div>
                    </div>
                `;
            }
        } catch (error) {
            container.innerHTML = `
                <div class="flex-1 flex flex-col overflow-hidden p-6 md:p-8">
                    <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-600 shadow-sm flex-1 flex items-center justify-center p-8">
                        <div class="alert alert-danger">Error loading collections</div>
                    </div>
                </div>
            `;
            console.error(error);
        }
    }

    function displayCollections(collections) {
        const container = document.getElementById('collections-view');
        allCollections = collections || [];
        filterText = '';

        document.getElementById('data-title').innerHTML = '<i class="fas fa-folder-open text-blue-500 dark:text-blue-400 mr-2"></i>Database: ' + escapeHtml(window.currentDatabase);
        document.getElementById('data-stats').innerHTML = 'Total <span class="text-blue-600 dark:text-blue-400 font-semibold">' + allCollections.length + '</span> collections';

        const actionsEl = document.getElementById('data-header-actions');
        if (actionsEl) {
            actionsEl.innerHTML = `
                <button type="button" class="flex items-center gap-2 px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white rounded-lg text-sm font-medium transition shadow-sm shadow-emerald-100" onclick="window._importCollection()">
                    <i class="fas fa-file-import"></i> Import
                </button>
                <button type="button" class="flex items-center gap-2 px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg text-sm font-medium transition shadow-sm shadow-blue-100" onclick="window._exportSelectedCollections()">
                    <i class="fas fa-file-export"></i> Export
                </button>
                <button type="button" id="btn-del-collections" class="hidden flex items-center gap-2 px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg text-sm font-medium transition" onclick="window._deleteSelectedCollections()">
                    <i class="fas fa-trash-alt"></i> Del<span class="btn-del-count"></span>
                </button>
            `;
        }

        if (collections.length === 0) {
            container.innerHTML = `
                <div class="flex-1 flex flex-col overflow-hidden p-6 md:p-8">
                    <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-600 shadow-sm flex-1 flex items-center justify-center">
                        <p class="text-gray-400 dark:text-gray-500 text-sm">No collections in this database</p>
                    </div>
                </div>
            `;
            return;
        }

        container.innerHTML = `
            <div class="flex-1 flex flex-col overflow-hidden p-6 md:p-8">
                <div class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-600 shadow-sm flex-1 flex flex-col overflow-hidden min-h-0">
                    <div class="p-4 border-b border-gray-100 dark:border-gray-700 bg-gray-50/30 dark:bg-gray-700/30 flex items-center gap-4">
                        <div class="relative flex-1">
                            <i class="fas fa-search absolute left-3 top-2.5 text-gray-400 dark:text-gray-500 text-sm"></i>
                            <input type="text" id="collections-search" placeholder="Search collection names..." class="w-full pl-10 pr-4 py-2 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg text-sm dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition">
                        </div>
                    </div>
                    <div class="flex-1 overflow-y-auto collection-scrollbar min-h-0">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky top-0 bg-white dark:bg-gray-800 shadow-[0_1px_0_0_rgba(0,0,0,0.05)] dark:shadow-[0_1px_0_0_rgba(255,255,255,0.05)] z-10">
                                <tr class="text-gray-400 dark:text-gray-500 text-[11px] uppercase tracking-wider">
                                    <th class="px-6 py-4 font-bold w-12 text-center">
                                        <input type="checkbox" id="select-all-collections" class="rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500" title="Select all">
                                    </th>
                                    <th class="px-6 py-4 font-bold">Collection name</th>
                                    <th class="px-6 py-4 font-bold text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="collections-tbody" class="divide-y divide-gray-50 dark:divide-gray-600"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;

        const tbody = document.getElementById('collections-tbody');
        document.getElementById('select-all-collections').addEventListener('click', function (e) {
            document.querySelectorAll('#collections-view .collection-checkbox').forEach(cb => { cb.checked = e.target.checked; });
            updateDelButton();
        });

        document.getElementById('collections-search').addEventListener('input', function () {
            filterText = this.value;
            applyFilter();
        });

        tbody.addEventListener('click', function (e) {
            if (e.target.type === 'checkbox' || e.target.closest('button')) return;
            const tr = e.target.closest('tr');
            if (tr && tr.dataset.collection) window._selectCollection(tr.dataset.collection);
        });

        renderTableRows(allCollections);
    }

    window._selectCollection = async function (collectionName) {
        window.currentCollection = collectionName;
        document.getElementById('data-title').textContent = window.currentDatabase + ' / ' + collectionName;
        document.getElementById('data-stats').textContent = '';
        window._navigate('data');
    };

    window._importCollection = async function () {
        if (!window.currentConnection || !window.currentDatabase) {
            window.showAlert('Please select a database first', 'Notice', 'warning');
            return;
        }
        try {
            const result = await eel.import_collection(window.currentConnection.name, window.currentDatabase)();
            if (result.success) {
                window.showAlert(result.message, 'Import success', 'success');
                loadCollections();
            } else {
                if (result.message !== 'No file selected') window.showAlert(result.message, 'Notice', 'error');
            }
        } catch (e) {
            window.showAlert('Error during import', 'Error', 'error');
        }
    };

    window._exportSelectedCollections = async function () {
        const checked = document.querySelectorAll('#collections-view .collection-checkbox:checked');
        if (checked.length === 0) { window.showAlert('Please select collections to export', 'Notice', 'warning'); return; }
        const names = Array.from(checked).map(cb => cb.dataset.collection);
        try {
            const result = await eel.export_collections(window.currentConnection.name, window.currentDatabase, names)();
            if (result.success) {
                window.showAlert(result.message, 'Export success', 'success');
            } else {
                if (result.message !== 'Export cancelled' && result.message !== 'No folder selected') {
                    window.showAlert(result.message, 'Error', 'error');
                }
            }
        } catch (e) {
            window.showAlert('Error during export', 'Error', 'error');
        }
    };

    window._deleteSelectedCollections = async function () {
        const checked = document.querySelectorAll('#collections-view .collection-checkbox:checked');
        if (checked.length === 0) { window.showAlert('Please select collections to delete', 'Notice', 'warning'); return; }
        const names = Array.from(checked).map(cb => cb.dataset.collection);
        const msg = 'Are you sure you want to delete ' + names.length + ' collections?\n\n' + names.join('\n') + '\n\nThis action cannot be undone!';
        if (!await window.showConfirm(msg, 'Confirm delete collections')) return;
        try {
            const result = await eel.drop_collections(window.currentConnection.name, window.currentDatabase, names)();
            if (result.success) {
                window.showAlert(result.message, 'Success', 'success');
                loadCollections();
            } else {
                window.showAlert(result.message, 'Error', 'error');
            }
        } catch (e) {
            window.showAlert('Error during delete', 'Error', 'error');
        }
    };

    loadCollections();
})();
</script>
